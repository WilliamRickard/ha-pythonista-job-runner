# Version: 0.1.0

name: ci
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: |
          python -m pip install -U pip
          python -m pip install pytest
      - name: Compile
        run: |
          python -m compileall ghkit ghkit_pythonista pythonista_wrappers tools
      - name: Tests
        run: |
          python -m pytest -q
