# Version: 0.6.12-docs.2
---
name: Lint

on:
  push:
  pull_request:

jobs:
  addon-linter:
    name: Add-on configuration lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Run Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: "./pythonista_job_runner"

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Run yamllint
        uses: frenck/action-yamllint@v1
        with:
          strict: true

  hadolint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
          dockerfile: pythonista_job_runner/Dockerfile

  docs:
    name: Docs checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Check generated Web UI bundle
        run: |
          python pythonista_job_runner/app/webui_build.py --check
      - name: Run docs checks
        run: |
          python -m pytest -q \
            pythonista_job_runner/tests/test_docs_links_exist.py \
            pythonista_job_runner/tests/test_readme_screenshot_assets.py \
            pythonista_job_runner/tests/test_screenshot_filename_contract.py



  packaging-guardrails:
    name: Packaging guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Run packaging/config guardrail tests
        run: |
          python -m pytest -q \
            pythonista_job_runner/tests/test_addon_packaging_guardrails.py

  api-hardening:
    name: API hardening checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Run API and archive hardening tests
        run: |
          python -m pytest -q \
            pythonista_job_runner/tests/test_http_api_basic.py \
            pythonista_job_runner/tests/test_http_api_lifecycle_integration.py \
            pythonista_job_runner/tests/test_utils_zip_extract.py

  pytest:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Run pytest
        run: |
          cd pythonista_job_runner
          pytest -q
