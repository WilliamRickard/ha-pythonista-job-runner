# Version: 0.1.0

name: release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build runtime zip and manifest
        run: |
          python -m pip install -U pip
          python tools/build_runtime_bundle.py --tag "${{ github.ref_name }}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ghkit_runtime_${{ github.ref_name }}.zip
            dist/manifest_${{ github.ref_name }}.json
