# Version: 0.3.0-services-yaml.1
purge_jobs:
  name: Purge runner jobs
  description: Purge jobs from the add-on queue/history.
  fields:
    entry_id:
      required: true
      selector:
        text:
    states:
      selector:
        object:
    older_than_hours:
      selector:
        number:
          min: 0
          max: 720
          mode: box
    dry_run:
      selector:
        boolean:

purge_done_jobs:
  name: Purge completed jobs
  description: Purge jobs currently in done state.
  fields:
    entry_id:
      required: true
      selector:
        text:
    older_than_hours:
      selector:
        number:
          min: 0
          max: 720
          mode: box
    dry_run:
      selector:
        boolean:

purge_failed_jobs:
  name: Purge failed jobs
  description: Purge jobs currently in error state.
  fields:
    entry_id:
      required: true
      selector:
        text:
    older_than_hours:
      selector:
        number:
          min: 0
          max: 720
          mode: box
    dry_run:
      selector:
        boolean:

refresh:
  name: Refresh runner data
  description: Trigger an immediate coordinator refresh for one integration entry.
  fields:
    entry_id:
      required: true
      selector:
        text:

cancel_job:
  name: Cancel job
  description: Request cancellation of a queued or running job.
  fields:
    entry_id:
      required: true
      selector:
        text:
    job_id:
      required: true
      selector:
        text:

build_package_profile:
  name: Build package profile
  description: Build or rebuild one named package profile inside the add-on package store.
  fields:
    entry_id:
      required: true
      selector:
        text:
    profile_name:
      selector:
        text:
    rebuild:
      selector:
        boolean:

prune_package_cache:
  name: Prune package cache
  description: Trim private package storage down towards the configured cache limit.
  fields:
    entry_id:
      required: true
      selector:
        text:
    reason:
      selector:
        text:

purge_package_cache:
  name: Purge package cache
  description: Remove cached package artefacts, with optional reusable environments and imported wheels.
  fields:
    entry_id:
      required: true
      selector:
        text:
    reason:
      selector:
        text:
    include_venvs:
      selector:
        boolean:
    include_imported_wheels:
      selector:
        boolean:
