<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Pythonista Job Runner</title>
<base href="./"/>
<link rel="stylesheet" href="./webui.css"/>
<script defer src="./webui.js"></script>
</head>
<body>

<h1>Pythonista Job Runner</h1>
<small>v__ADDON_VERSION__ · <span id="statusline" class="statuschip" role="status" aria-live="polite">loading…</span></small>

<div id="stats" style="display:none;">
  <div class="kv" id="stats_kv"></div>
</div>

<div class="actions">
  <button id="refreshBtn" type="button">Refresh</button>
  <button id="autoBtn" type="button">Auto refresh: <span id="autostate">on</span></button>
  <label style="display:flex;align-items:center;gap:6px;color:var(--muted);">
    poll <input type="number" id="pollms" min="250" max="10000" step="250" value="2000" style="width:90px;"/> ms
  </label>
  <span style="flex:1 1 240px;"></span>
  <label class="sr-only" for="search">Search jobs</label>
  <input id="search" type="search" placeholder="Search job id or user…" style="flex:1 1 220px;min-width:160px;"/>
</div>

<div class="actions" style="margin-top:8px;">
  <button class="rowbtn" type="button" data-view="all">All</button>
  <button class="rowbtn" type="button" data-view="running">Running</button>
  <button class="rowbtn" type="button" data-view="error">Errors</button>
  <button class="rowbtn" type="button" data-view="done">Done</button>
  <span style="flex:1 1 240px;"></span>
  <button class="rowbtn" type="button" data-purge-state="done">Purge done</button>
  <button class="rowbtn" type="button" data-purge-state="error">Purge errors</button>
</div>

<table id="jobtable">
  <thead>
    <tr>
      <th>Job</th>
      <th>State</th>
      <th>Exit</th>
      <th>User</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="empty" style="display:none;">No jobs yet. Run something from Pythonista and hit Refresh.</div>

<div id="detail" style="display:none;">
  <h2 style="font-size:16px;margin:0 0 8px 0;">Job <span id="jobid"></span></h2>
  <div class="actions" style="margin-bottom:8px;">
    <button id="dlZip" type="button">Download zip</button>
    <button id="dlStdout" type="button">stdout.txt</button>
    <button id="dlStderr" type="button">stderr.txt</button>
    <button id="cancelBtn" type="button">Cancel</button>
    <button id="deleteBtn" type="button">Delete</button>
  </div>
  <div><small id="meta"></small></div>

  <div class="actions" style="margin-top:10px;">
    <button class="rowbtn" type="button" data-tab="stdout">stdout</button>
    <button class="rowbtn" type="button" data-tab="stderr">stderr</button>
    <button class="rowbtn" type="button" data-tab="overview">overview</button>
    <span style="flex:1 1 240px;"></span>
    <label style="display:flex;align-items:center;gap:6px;color:var(--muted);">
      <input type="checkbox" id="follow" checked/> follow
    </label>
    <label style="display:flex;align-items:center;gap:6px;color:var(--muted);">
      <input type="checkbox" id="wrap" checked/> wrap
    </label>
    <label style="display:flex;align-items:center;gap:6px;color:var(--muted);">
      font <input type="range" id="font" min="11" max="18" value="13"/>
    </label>
  </div>

  <div class="actions" style="margin-top:8px;">
    <label class="sr-only" for="logsearch">Find in log</label>
    <input id="logsearch" type="search" placeholder="Find in log…" style="flex:1 1 220px;min-width:160px;"/>
    <button id="findNext" class="rowbtn" type="button">Next</button>
    <button id="findPrev" class="rowbtn" type="button">Prev</button>
    <button id="clearSearch" class="rowbtn" type="button">Clear</button>
  </div>

  <div id="overview" style="display:none;margin-top:10px;">
    <div style="padding:12px;border:1px solid var(--line);border-radius:12px;background:var(--panel);">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <div style="flex:1 1 220px;"><small id="overview_text"></small></div>
        <button id="copyCurl" class="rowbtn" type="button">Copy curl snippet</button>
      </div>
      <div style="margin-top:10px;">
        <textarea id="curl_snippet" rows="8" readonly></textarea>
      </div>
    </div>
  </div>

  <div id="logpanel" style="margin-top:10px;">
    <pre id="logview"></pre>
  </div>
</div>

</body>
</html>
