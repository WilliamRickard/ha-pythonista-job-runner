<!-- Section: Overview stats panel -->
      <section id="stats" class="card card-quiet queue-compact queue-collapsible" hidden>
        <details id="queue_details" class="queue-details-shell">
          <summary>
            <span class="queue-summary-title">Queue overview</span>
            <span class="queue-summary-inline" id="queue_summary_text">0 total</span>
          </summary>
          <div class="card-body compact queue-details-body">
            <div class="kpis" id="kpis">
            <div class="kpi running">
              <button type="button" data-action="set-view" data-view="running" aria-label="Show running jobs">
                <div class="label">Running</div>
                <div class="value" id="kpi_running">0</div>
              </button>
            </div>
            <div class="kpi queued">
              <button type="button" data-action="set-view" data-view="queued" aria-label="Show queued jobs">
                <div class="label">Queued</div>
                <div class="value" id="kpi_queued">0</div>
              </button>
            </div>
            <div class="kpi error">
              <button type="button" data-action="set-view" data-view="error" aria-label="Show error jobs">
                <div class="label">Errors</div>
                <div class="value" id="kpi_error">0</div>
              </button>
            </div>
            <div class="kpi done">
              <button type="button" data-action="set-view" data-view="done" aria-label="Show completed jobs">
                <div class="label">Done</div>
                <div class="value" id="kpi_done">0</div>
              </button>
            </div>
            <div class="kpi">
              <button type="button" data-action="set-view" data-view="all" aria-label="Show all jobs">
                <div class="label">Total</div>
                <div class="value" id="kpi_total">0</div>
              </button>
            </div>
            </div>
          </div>
        </details>
      </section>

      <details class="header-meta overview-meta" id="header_meta">
        <summary>System details</summary>
        <div class="header-meta-content" aria-label="System metadata">
          <span class="meta-item">Version <strong>__ADDON_VERSION__</strong></span>
          <span class="meta-item">Last update <strong id="lastupdated">never</strong></span>
          <span class="meta-item" id="meta_ha_host" hidden>Home Assistant <strong></strong></span>
          <span class="meta-item" id="meta_access_mode" hidden>Direct access <strong></strong></span>
          <span class="meta-item" id="meta_allowed_cidrs" hidden>Allowed CIDRs <strong></strong></span>
        </div>
      </details>
