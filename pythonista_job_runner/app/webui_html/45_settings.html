<!-- Section: Settings panel -->
  <div id="settings_overlay" class="overlay" hidden aria-hidden="true">
    <div class="modal mobile-panel" id="settings_modal" role="dialog" aria-modal="true" tabindex="-1" aria-labelledby="settings_title" aria-describedby="settings_sub">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="settings_title">Settings</div>
          <div class="modal-sub" id="settings_sub">Runtime and UI preferences</div>
        </div>
        <button type="button" id="settings_close" class="small tertiary" data-action="close-settings" aria-label="Close settings">Close</button>
      </div>
      <div class="modal-body">
        <details open>
          <summary>Refresh behavior</summary>
          <label class="tog"><input type="checkbox" id="auto"/> Auto refresh</label>
          <div class="field adv-field">
            <label for="pollms">Poll interval (ms)</label>
            <input type="number" id="pollms" min="250" max="10000" step="250" value="2000" inputmode="numeric"/>
            <div class="hint compact-hint">Lower intervals update faster but use more battery and network.</div>
          </div>
        </details>

        <details open>
          <summary>Jobs list defaults</summary>
          <div class="field adv-field">
            <label for="settings_default_sort">Default sort</label>
            <select id="settings_default_sort" aria-label="Default sort">
              <option value="newest">Newest first</option>
              <option value="oldest">Oldest first</option>
              <option value="active">Active first</option>
              <option value="errors">Errors first</option>
            </select>
          </div>
          <label class="tog"><input type="checkbox" id="settings_keep_secondary"/> Keep secondary filters between sessions</label>
        </details>

        <details>
          <summary>Display</summary>
          <div class="field adv-field">
            <label for="settings_density">UI density</label>
            <select id="settings_density" aria-label="UI density">
              <option value="comfortable">Comfortable</option>
              <option value="compact">Compact</option>
            </select>
          </div>
        </details>
        <details>
          <summary>Maintenance</summary>
          <div class="hint compact-hint">Advanced cleanup and maintenance actions live here so the main header stays focused on jobs.</div>
          <div class="help-actions-row">
            <button type="button" class="small tertiary" data-action="open-advanced">Open maintenance tools</button>
          </div>
        </details>
      </div>
    </div>
  </div>
