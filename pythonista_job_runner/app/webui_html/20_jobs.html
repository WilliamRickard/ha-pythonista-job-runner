<!-- Section: Jobs list and filters -->
      <section id="pane_jobs" class="card jobs-surface" aria-label="Jobs list and filters">
        <div class="card-header jobs-header">
          <h2>Jobs</h2>
        </div>
        <div class="card-body jobs-body">
          <div id="jobs_banner" class="banner" role="status" aria-live="polite" hidden></div>

          <div id="jobs_loading" class="loading" role="status" aria-live="polite" hidden>
            <div class="jobs-skeleton" aria-hidden="true">
              <span class="sk sk-lg"></span>
              <span class="sk"></span>
              <span class="sk"></span>
            </div>
            <span>Loading jobs…</span>
          </div>

          <div class="jobs-toolbar" aria-label="Jobs controls">
            <div class="searchbar-row">
              <label for="search" class="sr-only">Search jobs</label>
              <input id="search" type="search" placeholder="Search job id, user, state…" autocomplete="off"/>
              <button type="button" class="small tertiary clear-inline" data-action="clear-filters" id="clear_filters" aria-label="Clear search and filters" hidden>Clear</button>
            </div>

            <div class="jobs-primary-row" aria-label="Primary jobs controls">
              <div class="state-filters" role="group" aria-label="Primary job state filters">
                <button type="button" class="chip small" data-action="set-view" data-view="all" id="view_all">All</button>
                <button type="button" class="chip small" data-action="set-view" data-view="running" id="view_running">Running</button>
                <button type="button" class="chip small" data-action="set-view" data-view="queued" id="view_queued">Queued</button>
                <button type="button" class="chip small" data-action="set-view" data-view="error" id="view_error">Errors</button>
                <button type="button" class="chip small" data-action="set-view" data-view="done" id="view_done">Done</button>
              </div>
              <div class="jobs-secondary-row">
                <label class="sort-inline" for="job_sort">
                  <span>Sort</span>
                  <select id="job_sort" aria-label="Sort jobs">
                    <option value="newest">Newest first</option>
                    <option value="oldest">Oldest first</option>
                    <option value="active">Active first</option>
                    <option value="errors">Errors first</option>
                  </select>
                </label>
                <details class="secondary-panel">
                  <summary>More filters</summary>
                  <div class="secondary-panel-body">
                    <label class="tog"><input id="filter_has_result" type="checkbox"/> Only show jobs with result zip</label>
                  </div>
                </details>
              </div>
            </div>
          </div>

          <div class="table-region" aria-live="polite">
            <div class="tablewrap">
              <table id="jobtable">
                <caption class="sr-only">Submitted jobs and current lifecycle state</caption>
                <thead>
                  <tr>
                    <th scope="col">Job</th>
                    <th scope="col">State</th>
                    <th scope="col">Age</th>
                    <th scope="col">Duration</th>
                    <th scope="col">User</th>
                    <th scope="col">Actions</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>

            <div id="empty" class="empty" role="status" aria-live="polite" hidden>
              <div id="empty_title" class="empty-title">No jobs yet</div>
              <div id="empty_body" class="empty-body">Run the sample task to confirm setup, then open the new job when it appears.</div>
              <div class="help-actions-row">
                <button type="button" class="small secondary" data-action="copy-sample-task">Copy sample Python task</button>
                <button type="button" class="small tertiary" data-action="open-about">Open quick start</button>
              </div>
              <div id="empty_action" class="empty-action">After run, press Refresh or wait for auto refresh and open View.</div>
            </div>
          </div>
        </div>
      </section>
