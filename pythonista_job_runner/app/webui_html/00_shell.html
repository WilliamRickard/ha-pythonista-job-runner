  <div class="container">
    <header class="page-header monitor-header" id="main_header">
      <div class="brand">
        <h1>Pythonista Job Runner</h1>
        <div class="subline monitor-subline">
          <span class="pill status-pill" id="statuspill">
            <span class="dot" aria-hidden="true"></span>
            <span id="statusline" role="status" aria-live="polite">Connecting…</span>
          </span>
        </div>
      </div>

            <button type="button" class="small tertiary menu-item" data-action="open-settings" aria-haspopup="dialog" aria-label="Open settings">Settings</button>
            <button type="button" class="small tertiary menu-item" data-action="open-about" aria-haspopup="dialog" aria-label="Open help">Help</button>
          </div>
        </details>
      </div>

    <main id="main_content" tabindex="-1">
