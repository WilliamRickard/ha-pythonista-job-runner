<!-- Section: Advanced settings panel -->
  <div id="adv_overlay" class="overlay" hidden aria-hidden="true">
    <div class="modal mobile-panel" id="adv_modal" role="dialog" aria-modal="true" tabindex="-1" aria-labelledby="adv_title" aria-describedby="adv_sub">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="adv_title">Advanced</div>
          <div class="modal-sub" id="adv_sub">Refresh controls and maintenance</div>
        </div>
        <button type="button" id="adv_close" class="small" data-action="close-advanced" aria-label="Close advanced settings">Close</button>
      </div>
      <div class="modal-body">
        <div class="adv-grid compact">
          <div class="adv-block">
            <div class="adv-title">Polling</div>
            <label class="tog big"><input type="checkbox" id="auto"/> auto refresh</label>
            <div class="field adv-field">
              <label for="pollms">Poll interval (milliseconds)</label>
              <input type="number" id="pollms" min="250" max="10000" step="250" value="2000" inputmode="numeric"/>
              <div class="hint compact-hint">Lower intervals update faster but consume more power.</div>
            </div>
          </div>

          <div class="adv-block">
            <div class="adv-title">Maintenance</div>
            <div class="actionsbar destructive-group">
              <button type="button" class="small danger" data-action="purge" data-state="done">Purge done jobs</button>
              <button type="button" class="small danger" data-action="purge" data-state="error">Purge error jobs</button>
            </div>
            <div class="hint compact-hint">Purging removes stored job files. Use only when cleanup is needed.</div>
            <div class="actionsbar utility-group">
              <button type="button" class="small" data-action="reset-ui">Reset UI settings</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
