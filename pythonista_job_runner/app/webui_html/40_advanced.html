<!-- Section: Advanced maintenance panel -->
  <div id="adv_overlay" class="overlay" hidden aria-hidden="true">
    <div class="modal mobile-panel" id="adv_modal" role="dialog" aria-modal="true" tabindex="-1" aria-labelledby="adv_title" aria-describedby="adv_sub">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="adv_title">Advanced</div>
          <div class="modal-sub" id="adv_sub">Maintenance actions</div>
        </div>
        <button type="button" id="adv_close" class="small tertiary" data-action="close-advanced" aria-label="Close advanced">Close</button>
      </div>
      <div class="modal-body">
        <details open>
          <summary>Maintenance</summary>
          <div class="actionsbar destructive-group">
            <button type="button" class="small danger" data-action="purge" data-state="done">Purge done jobs</button>
            <button type="button" class="small danger" data-action="purge" data-state="error">Purge error jobs</button>
          </div>
          <div class="actionsbar utility-group">
            <button type="button" class="small tertiary" data-action="reset-ui">Reset UI settings</button>
          </div>
        </details>
      </div>
    </div>
  </div>
